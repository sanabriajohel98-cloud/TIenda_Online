<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">🛒 Carrito de compras</span>

    <div>
        <a href="/tienda" class="btn btn-outline-light btn-sm">Seguir comprando</a>
        <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
    </div>
</nav>

<div class="container mt-4">

{% for p in carrito %}
<div class="card p-2 mb-2">
    <h5>{{p.nombre}}</h5>
    <p>${{p.precio}}</p>
</div>
{% endfor %}

<hr>

<h4>💰 Total: ${{total}}</h4>

</div>

</body>
</html>
<br>
<a href="/tienda">⬅ Volver a tienda</a>
