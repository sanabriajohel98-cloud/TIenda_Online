<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width:350px;">

<h3 class="text-center">📚 Bglance</h3>

<form method="POST">
    <input class="form-control mb-2" name="user" placeholder="Usuario">
    <input class="form-control mb-3" name="pass" type="password" placeholder="Contraseña">
    <button class="btn btn-dark w-100">Entrar</button>
</form>

<a href="/registro" class="d-block text-center mt-2">Registrarse</a>

</div>

</body>
</html>
