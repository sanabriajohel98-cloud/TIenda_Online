{% extends "base.html" %}

{% block content %}

<h2>✏️ Editar Ticket #{{ticket.id}}</h2>

<form method="POST">
    <div class="mb-3">
        <label>Fecha</label>
        <input type="text" class="form-control" value="{{ticket.fecha.strftime('%d/%m/%Y %H:%M')}}" disabled>
    </div>
    <div class="mb-3">
        <label>Total (Gs.)</label>
        <input type="number" name="total" class="form-control" value="{{ticket.total}}" step="100">
    </div>
    <button class="btn btn-success">💾 Guardar</button>
    <a href="/tickets" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
